<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniHub - Página Principal</title>

</head>

<body>

    <header>
        <h1>UniHub</h1>
        <button id="menu">☰</button> 

        <input type="text" placeholder="Procurar">
        
    </header>

    <aside id="barra-lado">
        <nav>
            <ul>
                <li><button>Início</button></li>
                <li><button>Adicionar Conteúdo</button></li>
                <li><button>Customização</button></li>
                <li><button>Importar</button></li>
                <li><button>Exportar</button></li>
            </ul>
        </nav>
    </aside>

    <main>

        <section id="recente">
            <h2>Recentes</h2>

            <div class="Midias">
                <div class="Midias">Item 1</div>
                <div class="Midias">Item 2</div>
                <div class="Midias">Item 3</div>
                <div class="Midias">Item 4</div>
                <div class="Midias">Item 5</div>
            </div>
        </section>

        <section id="filtro">
            <h2>Filtrar por:</h2>

            <div class="filtros">
                <button>Todos</button>
                <button>Jogos</button>
                <button>Animes</button>
                <button>Filmes</button>
                <button>Séries</button>
                <button>Mangás</button>
            </div>
        </section>

    </main>

</body>
</html>
